name: acapella
description: "Acapella - Christian Choir Music Streaming App"

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Audio
  audio_service: ^0.18.13
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.11

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # Encryption (for offline downloads)
  encrypt: ^5.0.1
  crypto: ^3.0.3

  # UI
  google_fonts: ^6.2.0
  glassmorphism: ^3.0.0
  shimmer: ^3.0.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.19.0
  dartz: ^0.10.1
  get_it: ^7.6.4
  injectable: ^2.3.2
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  logger: ^2.0.2+1
  url_launcher: ^6.2.4
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  retrofit_generator: ^8.0.6
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  freezed: ^2.4.7
  injectable_generator: ^2.4.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
